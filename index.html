<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Horizon Chatbot</title>
    <style>
        /* Basic styling - easily adjustable to fit your website */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; margin: 0; }
        #chat-container { width: 350px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; }
        #chat-box { height: 400px; padding: 20px; overflow-y: auto; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 12px; }
        
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; word-wrap: break-word; font-size: 14px; line-height: 1.4; }
        .user-msg { background-color: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot-msg { background-color: #f1f0f0; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        #input-area { display: flex; padding: 15px; background-color: #fff; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
        #send-btn { background-color: #007bff; color: white; border: none; padding: 10px 18px; margin-left: 10px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: background-color 0.2s; }
        #send-btn:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-box">
        <div class="message bot-msg">Hello! Ask me anything about Hack Horizon 2.0.</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    // Allows the user to press 'Enter' to send a message
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function sendMessage() {
        const text = userInput.value.trim();
        if (text === '') return;

        // 1. Display the user's message in the chat UI
        appendMessage('user', text);
        userInput.value = ''; // Clear the input field

        // 2. Send the message to the Flask backend using the Fetch API
        fetch('/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json' // Tell the server we are sending JSON
            },
            body: JSON.stringify({ message: text }) // Convert the JS object to a JSON string
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json(); // Parse the JSON response from the server
        })
        .then(data => {
            // 3. Display the bot's reply in the chat UI
            appendMessage('bot', data.reply);
        })
        .catch(error => {
            console.error('Error:', error);
            appendMessage('bot', "Sorry, I'm having trouble connecting right now.");
        });
    }

    // Helper function to create chat bubbles dynamically
    function appendMessage(sender, text) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message');
        
        if (sender === 'user') {
            msgDiv.classList.add('user-msg');
        } else {
            msgDiv.classList.add('bot-msg');
        }
        
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        
        // Auto-scroll to the bottom of the chat box
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
